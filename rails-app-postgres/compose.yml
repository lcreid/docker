services:
  web:
    image: lenchoreyes/jade:rails-app-${RUBY_VERSION:-4.0}-postgres-trixie
    stdin_open: true
    tty: true
    user: "dev:dev"
    volumes:
      - .:/home/dev/app
      - dev_home:/home/dev
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - NODE_ENV=development
      - BOOTSNAP_CACHE_DIR=/usr/local/bundle/_bootsnap
      - WEB_CONCURRENCY=1
    command: /bin/bash
    ports:
      - ¨3000¨
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - PSQL_HISTFILE=/root/log/.psql_history
      - POSTGRES_USER=pg
      - POSTGRES_PASSWORD=pg
    ports:
      - 5432
    healthcheck:
      test: pg_isready -U pg -h 127.0.0.1
      interval: 5s

# The volumes are storage that docker-compose manages and maintains across rebuilds
# of the images and containers. If, for example, you need to change the default
# postgres user or password, you need to `docker volume rm <project_volume>`.
volumes:
  dev_home:
  postgres:
